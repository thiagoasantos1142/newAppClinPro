existing_routes_detected:
  - "POST /clinpro/auth/request-otp"
  - "POST /clinpro/auth/verify-otp"
  - "GET /ping"
  - "GET /clinpro/access-summary"
  - "GET /clinpro/profile"
  - "PUT /clinpro/profile"
  - "GET /dev/test-user"

conventions:
  auth:
    required: true
    header: "Authorization: Bearer <token>"
  response_envelope:
    preferred: false
    note: "O front atual consome respostas cruas em varias rotas. Se usar envelope, manter shape interno consistente e adaptar client."
