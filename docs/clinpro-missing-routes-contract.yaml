            score: 820
            level_label: "Nivel Profissional"
            progress_percent: 82
            next_criteria:
              - label: "Concluir 10 servicos sem cancelamento"
                reward_points: 30

  onboarding:
    - method: GET
      path: /clinpro/onboarding/status
      frontend_screens: ["Onboarding flow gate (futuro)", "OtpVerification -> OnboardingWelcome"]
      request:
        query: {}
      responses:
        "200":
          body:
            completed: false
            current_step: "welcome"
            steps:
              welcome: true
              questions: false
              profile: false
              account_intro: false
              kyc: false
              goal: false
              tutorial: false

    - method: POST
      path: /clinpro/onboarding/questions
      frontend_screens: ["OnboardingQuestions"]
      request:
        body:
          work_areas:
            - "Residencial"
            - "Comercial"
          availability_label: "Segunda a Sexta"
          availability_days:
            - "monday"
            - "tuesday"
            - "wednesday"
            - "thursday"
            - "friday"
      responses:
        "200":
          body:
            saved: true
            next_step: "profile"

    - method: PUT
      path: /clinpro/onboarding/profile
      frontend_screens: ["OnboardingProfile"]
      request:
        body:
          bio: "string"
          experience_years: 2
          specialties:
            - "Limpeza residencial"
            - "Limpeza comercial"
          service_region: "Zona Sul, Sao Paulo"
      responses:
        "200":
          body:
            saved: true
            next_step: "account_intro"

    - method: POST
      path: /clinpro/onboarding/account-intro/complete
      frontend_screens: ["OnboardingAccountIntro"]
      request:
        body:
          acknowledged: true
      responses:
        "200":
          body:
            saved: true
            next_step: "kyc"

    - method: POST
      path: /clinpro/onboarding/kyc
      frontend_screens: ["OnboardingKYC"]
      request:
        body:
          document_upload_ids:
            - "upl_rg"
            - "upl_selfie"
      responses:
        "200":
          body:
            status: "submitted"
            next_step: "goal"

    - method: POST
      path: /clinpro/onboarding/goal
      frontend_screens: ["OnboardingFirstGoal"]
      request:
        body:
          goal_type: "services_count|rating|income"
          target_value: 10
          period: "first_month"
      responses:
        "200":
          body:
            saved: true
            next_step: "tutorial"

    - method: POST
      path: /clinpro/onboarding/tutorial/complete
      frontend_screens: ["OnboardingTutorial"]
      request:
        body:
          completed: true
      responses:
        "200":
          body:
            completed: true
            onboarding_completed: true
            next_route: "MainTabs"
